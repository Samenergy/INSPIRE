networks:
  backend_network:
    driver: bridge

services:
  # FastAPI Backend
  app:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      milvus:
        condition: service_started
    environment:
      - MYSQL_URL=mysql+pymysql://app_user:app_password@mysql:3306/inspire
      - DB_NAME=inspire
      - DB_USER=app_user
      - DB_PASSWORD=app_password
      - DB_HOST=mysql
      - DB_PORT=3306
      - REDIS_URL=redis://redis:6379/0
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - LLM_MODEL_PATH=/app/models/Phi-3.5-mini-instruct-Q8_0.gguf
      - LLM_N_CTX=${LLM_N_CTX:-4096}
      - LLM_N_THREADS=${LLM_N_THREADS:-12}
      - DEBUG=False
      - TORCH_DEVICE=cpu
      - PYTORCH_ENABLE_MPS_FALLBACK=1
    volumes:
      - ./logs:/app/logs
      - ./models:/app/models  # Mount GGUF model directory
    networks:
      - backend_network
    restart: unless-stopped

  # Celery Worker for Background Tasks
  celery_worker:
    build: .
    command: celery -A app.celery_app worker --pool=threads --loglevel=info --concurrency=4 --max-tasks-per-child=5
    environment:
      - MYSQL_URL=mysql+pymysql://app_user:app_password@mysql:3306/inspire
      - DB_NAME=inspire
      - DB_USER=app_user
      - DB_PASSWORD=app_password
      - DB_HOST=mysql
      - DB_PORT=3306
      - REDIS_URL=redis://redis:6379/0
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - LLM_MODEL_PATH=/app/models/Phi-3.5-mini-instruct-Q8_0.gguf
      - LLM_N_CTX=${LLM_N_CTX:-4096}
      - LLM_N_THREADS=${LLM_N_THREADS:-8}
      - DEBUG=False
      - TORCH_DEVICE=cpu
      - PYTORCH_ENABLE_MPS_FALLBACK=1
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      milvus:
        condition: service_started
    volumes:
      - ./logs:/app/logs
      - ./models:/app/models  # Mount GGUF model directory
    networks:
      - backend_network
    restart: unless-stopped

  # MySQL Database
  mysql:
    image: mysql:8.0
    ports:
      - "127.0.0.1:3306:3306" 
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql_logs:/var/lib/mysql-logs  
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-password}
      - MYSQL_DATABASE=inspire
      - MYSQL_USER=app_user
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-app_password}
    networks:
      - backend_network
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password --max-allowed-packet=67108864
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-password}"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  # Redis Cache
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - backend_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # Milvus Vector Database
  milvus:
    image: milvusdb/milvus:v2.6.5
    ports:
      - "19530:19530"
    volumes:
      - milvus_data:/var/lib/milvus
    environment:
      - ETCD_ENDPOINTS=etcd:2379
      - MINIO_ADDRESS=minio:9000
    command: ["milvus", "run", "standalone"]
    depends_on:
      - etcd
      - minio
    networks:
      - backend_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 sh -c '</dev/tcp/127.0.0.1/19530' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s

  # Milvus Dependencies - etcd
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    networks:
      - backend_network
    restart: unless-stopped

  # Milvus Dependencies - MinIO
  minio:
    image: minio/minio:latest
    environment:
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    command: minio server /data --console-address ":9001"
    networks:
      - backend_network
    restart: unless-stopped

  # Nginx (Reverse Proxy + Frontend)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ../Frontend/dist:/usr/share/nginx/html:ro
      - ./ssl:/etc/letsencrypt:ro
      - ./certbot_www:/var/www/certbot
    depends_on:
      app:
        condition: service_healthy
    networks:
      - backend_network
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
  milvus_data:
  etcd_data:
  minio_data:
